<nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md shadow-sm">
  <div class="flex justify-between items-center px-6 py-4 max-w-7xl mx-auto">

    <div class="flex items-center gap-8">
      <a routerLink="/" class="text-xl font-black tracking-tighter text-slate-900">
        Architectural Curator
      </a>
      <div class="hidden md:flex gap-6">
        <a routerLink="/" class="text-sm text-slate-600 hover:text-slate-900 transition-colors">Shop</a>
        <a href="#" class="text-sm text-slate-600 hover:text-slate-900 transition-colors">Collections</a>
        <a href="#" class="text-sm text-slate-600 hover:text-slate-900 transition-colors">About</a>
      </div>
    </div>

    @if (!isLoggedIn()) {
      <div class="flex items-center gap-3">
        <a routerLink="/auth/login"
           class="px-4 py-2 text-sm font-medium text-slate-700 hover:text-slate-900 transition-colors">
          Login
        </a>
        <a routerLink="/auth/register"
           class="px-4 py-2 bg-slate-900 text-white text-sm font-medium rounded-lg hover:bg-slate-800 transition-colors">
          Register
        </a>
      </div>
    } @else {
      <div class="flex items-center gap-3">
        <a routerLink="/cart" class="relative p-2 text-slate-600 hover:text-slate-900 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 00-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm12.75 0a.75.75 0 11-1.5 0 .75.75 0 011.5 0z"/>
          </svg>
          @if (cartService.itemCount() > 0) {
            <span class="absolute -top-1 -right-1 w-5 h-5 bg-slate-900 text-white text-xs font-bold rounded-full flex items-center justify-center">
              {{ cartService.itemCount() }}
            </span>
          }
        </a>

        <!-- <a routerLink="/orders" class="text-sm text-slate-600 hover:text-slate-900 transition-colors">
          Orders
        </a> -->

        <div class="h-5 w-px bg-slate-200"></div>

         <div class="profile-pill">{{ currentUserName() }}</div>

        <button (click)="logout()"
          class="px-3 py-1.5 text-sm text-slate-500 hover:text-slate-900 border border-slate-200 rounded-lg hover:border-slate-400 transition-all">
          Logout
        </button>
      </div>
    }
  </div>
  <div class="h-px bg-slate-200/50"></div>
</nav>
