<section class="bg-surface-container-lowest rounded-xl p-8 shadow-sm">

  <div class="space-y-6">
    <div class="relative">
      <label class="absolute -top-2 left-3 bg-surface-container-lowest px-1 text-[10px] font-bold uppercase tracking-widest text-primary z-10">Product Title</label>
      <input type="text" [(ngModel)]="product.name" 
             class="w-full bg-surface-container-low border-none rounded-lg p-4 pt-6 focus:ring-2 focus:ring-secondary/20 text-on-surface font-medium transition-all"/>
    </div>

    <div class="grid grid-cols-2 gap-6">
      <div class="relative">
        <label class="absolute -top-2 left-3 bg-surface-container-lowest px-1 text-[10px] font-bold uppercase tracking-widest text-primary z-10">Product ID</label>
        <input type="text" [value]="product.id" readonly
               class="w-full bg-surface-container-low border-none rounded-lg p-4 pt-6 text-on-surface font-medium opacity-70"/>
      </div>

      <div class="relative">
        <label class="absolute -top-2 left-3 bg-surface-container-lowest px-1 text-[10px] font-bold uppercase tracking-widest text-primary z-10">Category</label>
        <select [(ngModel)]="product.categoryId" 
                class="w-full bg-surface-container-low border-none rounded-lg p-4 pt-6 focus:ring-2 focus:ring-secondary/20 text-on-surface font-medium transition-all appearance-none">
          <option value="" disabled>Select a category</option>
          @for (cat of categories; track cat.id) {
            <option [value]="cat.id">{{ cat.name }}</option>
          }
        </select>
      </div>
    </div>

    <div class="relative">
      <label class="absolute -top-2 left-3 bg-surface-container-lowest px-1 text-[10px] font-bold uppercase tracking-widest text-primary z-10">Description</label>
      <textarea [(ngModel)]="product.description" rows="6"
                class="w-full bg-surface-container-low border-none rounded-lg p-4 pt-6 focus:ring-2 focus:ring-secondary/20 text-on-surface body-lg leading-relaxed transition-all"></textarea>
    </div>
  </div>
</section>

<div class="grid grid-cols-2 gap-4 mt-8">
  <div class="relative">
    <label class="absolute -top-2 left-3 bg-surface-container-lowest px-1 text-[10px] font-bold uppercase tracking-widest text-primary z-10">Price (USD)</label>
    <input type="number" [(ngModel)]="product.price"
           class="w-full bg-surface-container-low border-none rounded-lg p-4 pt-6 focus:ring-2 focus:ring-secondary/20 text-on-surface font-bold transition-all"/>
  </div>
  <div class="relative">
    <label class="absolute -top-2 left-3 bg-surface-container-lowest px-1 text-[10px] font-bold uppercase tracking-widest text-primary z-10">Stock Qty</label>
    <input type="number" [(ngModel)]="product.stockQuantity"
           class="w-full bg-surface-container-low border-none rounded-lg p-4 pt-6 focus:ring-2 focus:ring-secondary/20 text-on-surface font-bold transition-all"/>
  </div>
</div>

<div class="relative group aspect-square rounded-lg overflow-hidden bg-surface-container mt-8 w-1/3">
  @if (product.mainImageUrl) {
    <img [src]="imageBaseUrl + product.mainImageUrl" [alt]="product.name" class="w-full h-full object-cover"/>
  } @else {
    <div class="flex items-center justify-center w-full h-full bg-gray-200">No Image</div>
  }
</div>
<div class="mt-8 flex justify-end">
  <button (click)="saveChanges()" 
          class="bg-primary text-on-primary px-8 py-4 rounded-lg font-bold uppercase tracking-widest hover:bg-primary/90 transition-colors">
    Save Changes
  </button>
</div>
