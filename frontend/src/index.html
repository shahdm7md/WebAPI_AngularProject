<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Architectural Curator</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "on-background": "#161c27",
            "surface-tint": "#585e6c",
            "surface-container-high": "#e3e8f9",
            "tertiary": "#000918",
            "on-secondary": "#ffffff",
            "surface-variant": "#dde2f3",
            "on-surface-variant": "#45474c",
            "outline-variant": "#c6c6cc",
            "outline": "#76777c",
            "on-tertiary": "#ffffff",
            "surface": "#f9f9ff",
            "surface-container-low": "#f1f3ff",
            "surface-container": "#e8eeff",
            "error": "#ba1a1a",
            "background": "#f9f9ff",
            "on-error": "#ffffff",
            "on-primary": "#ffffff",
            "on-surface": "#161c27",
            "primary": "#030813",
            "secondary": "#006a68"
          },
          "fontFamily": {
            "headline": ["Inter"],
            "body": ["Inter"],
            "label": ["Inter"]
          }
        }
      }
    }
  </script>

  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .glass-header {
      background: rgba(249, 249, 255, 0.8);
      backdrop-filter: blur(12px);
    }
    .primary-gradient {
      background: linear-gradient(135deg, #030813 0%, #1a202c 100%);
    }
  </style>
</head>

<body class="bg-surface font-body text-on-surface  min-h-screen">
  <app-root></app-root>
</body>
</html>
